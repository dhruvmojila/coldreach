site_name: ColdReach
site_description: Open-source email finder and lead discovery — free alternative to Hunter.io and Apollo.io
site_url: https://dhruvmojila.github.io/coldreach/
site_author: Dhruv Mojila
repo_name: dhruvmojila/coldreach
repo_url: https://github.com/dhruvmojila/coldreach
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_object_full_path: false
            members_order: source
            separate_signature: true
            merge_init_into_class: true
            docstring_section_style: table
            filters:
              - "!^_"          # hide private members (leading underscore)
              - "!^__"         # hide dunder members
              - "^__init__"    # but always show __init__

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli-reference.md
  - Configuration: configuration.md
  - How It Works: how-it-works.md
  - Discovery Sources: sources.md
  - API Server: api-server.md
  - API Reference:
    - api/index.md
    - Data Models: api/models.md
    - Verification: api/verify.md
    - Discovery Sources: api/sources.md
    - Pattern Generation: api/generate.md
    - Cache & Storage: api/storage.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dhruvmojila/coldreach

copyright: Copyright &copy; 2024 ColdReach Contributors — MIT License
