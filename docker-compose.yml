###############################################################################
# ColdReach — Docker Compose service stack
#
# First-time setup:
#   ./scripts/setup.sh          ← does everything automatically
#
# Manual start (after setup):
#   docker compose up -d        ← starts all services
#   docker compose up --wait    ← starts and waits until all healthy
#   coldreach status            ← verify everything is up
#
# Core services only (faster):
#   docker compose up -d searxng reacher
#
# Services (non-default ports to avoid clashing with local dev services):
#   postgres      :5433  — persistent storage       (avoids local :5432)
#   redis         :6380  — result cache (TTL 7 days) (avoids local :6379)
#   searxng       :8088  — metasearch engine         (avoids local :8080)
#   reacher       :8083  — SMTP email verification   (Rust microservice)
#   spiderfoot    :5001  — deep OSINT REST API        (builds from ./spiderfoot/)
#   theharvester  :5050  — email/host harvester       (builds from ./theHarvester/)
#
# Firecrawl is NOT included here — it requires its own multi-service stack.
# If you want JS-heavy scraping see: https://github.com/mendableai/firecrawl
###############################################################################

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: coldreach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coldreach
      POSTGRES_USER: coldreach
      POSTGRES_PASSWORD: coldreach_dev
    ports:
      - "5433:5432"
    volumes:
      - coldreach_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldreach -d coldreach"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: coldreach-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - coldreach_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── SearXNG ────────────────────────────────────────────────────────────────
  # Privacy-first metasearch engine — queries 40+ search engines.
  # ColdReach falls back to DDG Lite → Brave when SearXNG is unavailable.
  searxng:
    image: searxng/searxng:latest
    container_name: coldreach-searxng
    restart: unless-stopped
    ports:
      - "8088:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://localhost:8088/"
      SEARXNG_SECRET_KEY: "coldreach-searxng-change-this-in-production"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/ 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Reacher ────────────────────────────────────────────────────────────────
  # Rust SMTP verifier. Handles catch-all, Hotmail/Yahoo quirks, TLS.
  # API: POST http://localhost:8083/v0/check_email {"to_email": "user@domain.com"}
  #
  # Note: GET / returns no HTTP response (by design — this is normal).
  # The health check uses a TCP probe since Reacher has no HTTP health endpoint.
  reacher:
    image: reacherhq/backend:0.11.6
    container_name: coldreach-reacher
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      RCH_HTTP_HOST: "0.0.0.0"
      RCH_HTTP_PORT: "8083"
      # Uncomment to set the HELO domain for SMTP handshakes:
      # RCH_HELLO_NAME: "mail.yourdomain.com"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8083' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── SpiderFoot ─────────────────────────────────────────────────────────────
  # Deep OSINT engine built from ./spiderfoot/ (local clone of v4.0).
  # Covers: WHOIS, DNS, subdomains, social profiles, breach data, 200+ modules.
  # Web UI: http://localhost:5001/
  # API:    http://localhost:5001/api/
  #
  # First run: docker compose build spiderfoot  (done by scripts/setup.sh)
  spiderfoot:
    build:
      context: ./spiderfoot
      dockerfile: Dockerfile
    container_name: coldreach-spiderfoot
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - coldreach_spiderfoot_data:/var/lib/spiderfoot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:5001/ 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── theHarvester ───────────────────────────────────────────────────────────
  # Multi-source email/host/subdomain harvester.
  # API:    GET http://localhost:5050/query?domain=acme.com&source=bing,crtsh&limit=500
  # Docs:   http://localhost:5050/docs
  #
  # Free sources (no API key): bing, duckduckgo, crtsh, hackertarget,
  #   rapiddns, certspotter, dnsdumpster, urlscan, threatminer, otx
  # API-key sources: set keys in ./theHarvester/theHarvester/data/api-keys.yaml
  #
  # First run: docker compose build theharvester  (done by scripts/setup.sh)
  theharvester:
    build:
      context: ./theHarvester
      dockerfile: Dockerfile
    container_name: coldreach-theharvester
    restart: unless-stopped
    ports:
      - "5050:80"
    volumes:
      - ./theHarvester/theHarvester/data/api-keys.yaml:/root/.theHarvester/api-keys.yaml:ro
      - ./theHarvester/theHarvester/data/api-keys.yaml:/etc/theHarvester/api-keys.yaml:ro
      - ./theHarvester/theHarvester/data/proxies.yaml:/root/.theHarvester/proxies.yaml:ro
      - ./theHarvester/theHarvester/data/proxies.yaml:/etc/theHarvester/proxies.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost/docs')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  coldreach_pg_data:
    name: coldreach_pg_data
  coldreach_redis_data:
    name: coldreach_redis_data
  coldreach_spiderfoot_data:
    name: coldreach_spiderfoot_data
